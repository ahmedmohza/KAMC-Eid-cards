<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة عيد</title>
  <style>
    :root {
      --card-width: 360px;
      --ui-bg: #f5f2ef;
      --line: #d7d0c9;
      --ink: #355968;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #ece7e3;
      color: #24343d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 20px;
    }
    .panel {
      width: min(100%, 820px);
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(6px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }
    label { font-weight: 700; }
    input {
      width: min(100%, 320px);
      border: 1px solid #c9c0b8;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 18px;
      background: #fff;
      text-align: center;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      background: #355968;
      color: white;
    }
    button.secondary { background: #8f765f; }
    .preview-wrap {
      width: min(100%, var(--card-width));
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(0,0,0,.12);
      background: white;
    }

    function fitOverlayText(el) {
      el.style.fontSize = '48px';
      let size = 48;
      while ((el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight) && size > 22) {
        size -= 1;
        el.style.fontSize = size + 'px';
      }
    }

    function updateName() {
      overlay.textContent = input.value.trim();
      fitOverlayText(overlay);
    }

    function drawExport() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

      const text = input.value.trim();
      if (text) {
        let fontSize = 70;
        const x = 540;
        const y = 1360;
        const maxWidth = 390;
        ctx.fillStyle = '#3f6170';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        do {
          ctx.font = `500 ${fontSize}px Tahoma, Arial, sans-serif`;
          fontSize -= 1;
        } while (ctx.measureText(text).width > maxWidth && fontSize > 30);
        ctx.fillText(text, x, y);
      }
    }

    input.addEventListener('input', updateName);

    clearBtn.addEventListener('click', () => {
      input.value = '';
      updateName();
    });

    downloadBtn.addEventListener('click', () => {
      if (!bg.complete) return;
      drawExport();
      const link = document.createElement('a');
      const safeName = (input.value.trim() || 'eid-card').replace(/[\/:*?"<>|]/g, '-');
      link.href = canvas.toDataURL('image/png');
      link.download = `${safeName}.png`;
      link.click();
    });

    bg.onload = () => {
      updateName();
      drawExport();
    };
  </script>
