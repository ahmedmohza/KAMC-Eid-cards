<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطاقة عيد</title>

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700&display=swap" rel="stylesheet">

<style>
body{
    text-align:center;
    background:#f5f5f5;
    font-family:'Almarai', sans-serif;
}

.container{
    position:relative;
    width:600px;
    margin:auto;
}

.container img{
    width:100%;
}

.name{
    position:absolute;
    bottom:180px;   /* موقع الاسم بين الأقواس */
    left:50%;
    transform:translateX(-50%);
    font-family:'Almarai', sans-serif;
    font-weight:700;
    font-size:32px;  /* حجم أصغر */
    color:#355e64;
    width:70%;
    text-align:center;
}

input{
    padding:10px;
    margin-top:20px;
    width:250px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>اكتب اسمك لإضافةه على بطاقة العيد</h2>

<input type="text" id="username" placeholder="اكتب الاسم هنا">

<button onclick="updateName()">إضافة الاسم</button>

<div class="container" id="card">
    <img src="قصة إنستقرام عن عيد سعيد تصميم إسلام بألوان متعددة.png">
    <div class="name" id="nameBox"></div>
</div>

<button onclick="download()">تحميل الصورة</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function updateName(){
    var name=document.getElementById("username").value;
    document.getElementById("nameBox").innerText=name;
}

function download(){
    html2canvas(document.getElementById("card")).then(function(canvas){
        var link=document.createElement("a");
        link.download="eid-card.png";
        link.href=canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
